# UltimateSensor Common Configuration
# This file contains all shared configuration between Basic and Complete versions

substitutions:
  project_main_version: "2"
  project_version: "2.28"
  log_level: "INFO"
  
# Esphome start
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: "EverythingSmartTechnology.Everything Presence Lite"
    version: ${project_version}
    on_update:
      then:
        - logger.log: "UltimateSensor Mini firmware updated successfully!"
        - light.turn_on:
            id: rgb_front_light
            brightness: 100%
            red: 0%
            green: 100%
            blue: 0%
            flash_length: 500ms
  on_boot:
    - then:
        - wait_until:
            condition:
              wifi.connected
            timeout: 30s
        - script.execute: play_stream
        # Disable Bluetooth after WiFi is connected to save memory
        - ble.disable:

# External components (removed LD2450)
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  partitions: "default_16MB.csv"
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80Mhz

# Bluetooth for provisioning (will be disabled after WiFi connects)
esp32_ble:
  id: ble_id

# Enable improv over BLE for initial WiFi provisioning
esp32_improv:
  authorizer: none

# Enable improv over serial for USB provisioning
improv_serial:

# Start up script
script:
  - id: play_stream
    then:
      - media_player.volume_set:  
          id: speaker
          volume: 50%
      # Play boot sound
      - media_player.play_media:
          id: speaker
          media_url: "https://smarthomeshop.io/products/ultimatesensor-mini/v1/audio/boot1.mp3"
      # Wait 3 seconds to load media
      - delay: 3s
      # Turn front and back light on white
      - light.turn_on:
          id: rgb_front_light
          brightness: 80%
          red: 100%
          green: 100%
          blue: 100%
      - light.turn_on:
          id: rgb_back_light
          brightness: 80%
          red: 100%
          green: 100%
          blue: 100%
      # Wait 6 seconds to play boot sound
      - delay: 6s
      # Turn off front and back light
      - light.turn_off:
          id: rgb_front_light
      - light.turn_off:
          id: rgb_back_light

# Speaker part
i2s_audio:
  - id: i2s_speaker
    i2s_lrclk_pin: GPIO8
    i2s_bclk_pin: GPIO18
  - id: i2s_microphone
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO16

media_player:
  - platform: i2s_audio
    id: speaker
    name: US Mini Media Player
    dac_type: external
    i2s_dout_pin: GPIO17
    i2s_audio_id: i2s_speaker
    mode: mono

#Microphone part
microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_microphone
    adc_type: external
    i2s_din_pin: GPIO15
    pdm: false
    channel: right
    #bits_per_sample: 32bit
    #sample_rate: 40000

#Voice Assistant part
voice_assistant:
  id: va
  microphone: mic
  #noise_suppression_level: 2
  auto_gain: 31dBFS
  #volume_multiplier: 4.0
  use_wake_word: false
  media_player: speaker
  on_error: 
   - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - switch.turn_off: use_wake_word
          - switch.turn_on: use_wake_word      

  on_client_connected:
    - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - voice_assistant.start_continuous:

  on_client_disconnected:
    - if:
        condition:
          switch.is_on: use_wake_word
        then:
          - voice_assistant.stop:
  
  on_wake_word_detected:
    then:
        # Turn front light on RED
      - light.turn_on:
          id: rgb_front_light
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
    
  on_stt_vad_start:
    then:
      - light.turn_off:
          id: rgb_front_light

# Enable I2C with debugging
i2c:
  - id: bus_a
    sda: GPIO11
    scl: GPIO10
    scan: true
    frequency: 100kHz  # Lower frequency for stability

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO20
    num_leds: 1
    chipset: WS2812
    rmt_symbols: 48
    name: "Back light"
    id: rgb_back_light

  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO5
    num_leds: 1
    chipset: WS2812
    rmt_symbols: 48
    name: "Front light"
    id: rgb_front_light

# Status LED of ESP
status_led:
  pin: GPIO19

sensor:
  # SCD41
  - platform: scd4x
    id: my_scd41
    co2:
      id: scd41_co2
      name: "SCD41 CO2"
    temperature:
      id: scd41_temperature
      name: "SCD41 Temperature"
    humidity:
      id: scd41_humidity
      name: "SCD41 Humidity"
      filters:
        offset: 3
    measurement_mode: low_power_periodic
    update_interval: 30s
    temperature_offset: 2.3

  # BH1750
  - platform: bh1750
    id: illuminance
    name: "BH1750 Illuminance"
    address: 0x23
    update_interval: 60s

  # SGP41
  - platform: sgp4x
    id: sgp41
    voc:
      id: voc_index
      name: "VOC Index"
    nox:
      id: nox_index
      name: "NOx Index"
    compensation:
      humidity_source: scd41_humidity
      temperature_source: scd41_temperature

  # System monitoring sensors
  - platform: internal_temperature
    id: cpu_temperature
    name: "CPU Temperature"
    unit_of_measurement: "°C"
    entity_category: "diagnostic"

# Enable wake word switch
switch:
  - platform: template
    id: use_wake_word
    name: Use wake word
    optimistic: true
    # restore_mode: RESTORE_DEFAULT_ON
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      - lambda: id(va).set_use_wake_word(true);
      - if:
          condition:
            not:
              - voice_assistant.is_running
          then:
            - voice_assistant.start_continuous
    on_turn_off:
      - voice_assistant.stop
      - lambda: id(va).set_use_wake_word(false);
  
button:
  - platform: restart
    id: btn_restart
    name: "Restart"
  - platform: template
    id: co2_calibration_button
    name: "CO2 manual calibration (only in fresh air for at least 10min)"
    entity_category: "config"
    on_press:
      then:
        - scd4x.perform_forced_calibration:
            value: 420
            id: my_scd41

  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: "config"
    disabled_by_default: true

binary_sensor:
  # Start wake word on HA connection
  - platform: status
    id: api_connection
    name: API Connection
    filters:
      - delayed_on: 1s
    on_press:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - voice_assistant.start_continuous:
    on_release:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - voice_assistant.stop:
